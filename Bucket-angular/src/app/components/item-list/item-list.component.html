<!DOCTYPE html><!-- user-table.component.html -->
<div>
    <h2>Items Table</h2>

    <div class="button-container">
      <button class="blue-button" [routerLink]="['/form']">Add Item</button>
    </div>

    <table class="table table-striped table-bordered">
      <thead>
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet">
        <tr>
          <th>#</th>
          <th>Item Name</th>
          <th>Created Date</th>
          <th>Updated Date</th>
          <th>Quantity</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of itemList; let i = index">
          <td>{{ i + 1 }}</td>
          <td>{{ item.itemname }}</td>
          <td>{{ item.create | date: 'fullDate' }}</td>
          <td>{{ item.update | date: 'fullDate' }}</td>
          <td>{{ item.quantity }}</td>
          <td>
            <button class="blue-button" (click)="setItemForQuantity(item)">
              Change Quantity
            </button>
            <button class="btn btn-warning btn-sm" [routerLink]="['/form', item.id]">
              <i class="fas fa-edit"></i>
            </button>
            <button class="btn btn-warning btn-sm" (click)="deleteUser(item.id)">
              <i class="fas fa-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>

    <!-- Quantity Form -->

    <div [ngClass]="isContainerVisible ? 'container' : ''">
      <form #quantityForm="ngForm" (ngSubmit)="submitQuantityForm()">
        <div *ngIf="selectedItem">
          <h3 class="center-text">Change Quantity for {{ selectedItem.itemname }}</h3>
          <div class="input-row">
            <label for="quantity" class="input-label">Quantity :</label>
            <input id="quantity" name="quantity" type="number" [(ngModel)]="selectedItem.quantity" required class="input-field">
          </div>
          <div class="center-button">
            <button type="submit" class="btn-change">Change</button>
          </div>
        </div>
      </form>
    </div>
    
    
</div>
